<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0f172a">
  <meta name="stixio-version" content="1.0.0-rc.1">
  <meta name="stixio-build" content="__STIXIO_BUILD_SHA__">
  <title>Stixio Workshop</title>
  <meta name="description" content="Stixio Workshop 是一套模組化貼圖製作工作區，支援多圖匯入、智能裁切、去背修補、規格預覽與打包輸出。">
  <meta name="application-name" content="Stixio Workshop">
  <meta name="apple-mobile-web-app-title" content="Stixio Workshop">
  <meta property="og:title" content="Stixio Workshop">
  <meta property="og:description" content="Create, refine, review and package sticker artwork in one workspace.">
  <meta property="og:type" content="website">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./public/icons/stixio-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./public/icons/stixio-icon.svg">
  <link rel="stylesheet" href="./public/vendor/tailwind-3.4.17.css">
  <script src="./public/vendor/jszip-3.10.1.min.js"></script>
</head>
<body class="bg-[#f6f3ec]">
  <div id="app"></div>
  <script type="module">
    import { initStixioWorkshop } from './src/ui/stixio-workshop-app-v2.js';
    import { enhanceWorkshopUx } from './src/ui/workshop-ux.js';
    import { bridgeWorkshopLegacyControls } from './src/ui/workshop-ux-bridge.js';
    import { installBetaHardening } from './src/ui/beta-hardening.js';

    const diagnostics = installBetaHardening();
    const root = document.getElementById('app');
    try {
      initStixioWorkshop(root);
      enhanceWorkshopUx(root);
      bridgeWorkshopLegacyControls(root);
    } catch (error) {
      diagnostics?.reportError(error, { source: 'bootstrap', userVisible: true });
    }
  </script>
</body>
</html>
