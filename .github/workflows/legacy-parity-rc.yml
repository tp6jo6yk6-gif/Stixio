name: Legacy Parity RC

on:
  push:
    branches:
      - release/workshop-parity-rc1
      - workshop-parity-rc1
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: legacy-parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  parity-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply RC1 parity fixes
        run: |
          node --check scripts/apply-rc1-parity-fixes.mjs
          node scripts/apply-rc1-parity-fixes.mjs
          node --check scripts/apply-rc1-reorder-wait-fix.mjs
          node scripts/apply-rc1-reorder-wait-fix.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests and static build
        run: |
          set -o pipefail
          {
            npm test
            npm run build
          } 2>&1 | tee parity-ci.log

      - name: Extract and fingerprint Legacy baseline
        run: |
          set -o pipefail
          npm run parity:extract 2>&1 | tee parity-extract.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture runtime and functional parity evidence
        run: |
          set -o pipefail
          npm run test:e2e:parity 2>&1 | tee parity-browser.log

      - name: Upload Legacy parity baseline and patched sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-parity-baseline
          path: |
            parity-results
            parity-extract.log
            parity-ci.log
            parity-browser.log
            playwright-report/parity
            test-results
            src/core/destination-profiles.js
            src/ui/destination-controller.js
            src/ui/stixio-workshop-app-v2.js
            tests/e2e/parity-layout-refine-package.spec.js
            tests/e2e/parity-multisource-mask-review.spec.js
            tests/e2e/parity-refine-review.spec.js
            tests/e2e/parity-stress.spec.js
          if-no-files-found: error
          retention-days: 30
