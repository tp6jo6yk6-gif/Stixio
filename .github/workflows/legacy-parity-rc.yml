name: Legacy Parity RC

on:
  push:
    branches:
      - release/workshop-parity-rc1
      - workshop-parity-rc1
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: legacy-parity-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  parity-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Apply parity readiness fix
        run: |
          node --check scripts/fix-parity-hidden-input.mjs
          node scripts/fix-parity-hidden-input.mjs

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests and static build
        run: |
          set -o pipefail
          {
            npm test
            npm run build
          } 2>&1 | tee parity-ci.log

      - name: Extract and fingerprint Legacy baseline
        run: |
          set -o pipefail
          npm run parity:extract 2>&1 | tee parity-extract.log

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Capture runtime and functional parity evidence
        run: |
          set -o pipefail
          npm run test:e2e:parity 2>&1 | tee parity-browser.log

      - name: Upload Legacy parity baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-parity-baseline
          path: |
            parity-results
            parity-extract.log
            parity-ci.log
            parity-browser.log
            playwright-report/parity
            test-results
          if-no-files-found: error
          retention-days: 30

      - name: Commit verified parity test fix
        if: success()
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/parity-layout-refine-package.spec.js
          git diff --cached --quiet && exit 0
          git commit -m "Fix parity readiness for hidden file input"
          git push origin HEAD:${HEAD_BRANCH}
