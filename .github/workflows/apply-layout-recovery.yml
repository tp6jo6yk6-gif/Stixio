name: Apply Layout full recovery

on:
  push:
    branches:
      - layout-full-recovery
    paths:
      - 'scripts/apply-layout-recovery.mjs'
      - 'src/core/layout-recovery.js'
      - 'src/core/document/document.js'
      - 'src/core/index.js'
      - 'tests/layout-recovery.test.js'
      - '.github/workflows/apply-layout-recovery.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: layout-full-recovery
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Layout migration
        run: |
          if grep -q "function deleteSource(sourceId)" src/ui/stixio-workshop-app-v2.js; then
            echo "Layout migration already applied."
          else
            node scripts/apply-layout-recovery.mjs
          fi
      - name: Check syntax
        run: |
          node --check src/ui/stixio-workshop-app-v2.js
          node --check src/core/layout-recovery.js
          node --check src/core/document/document.js
      - name: Run Layout recovery tests
        run: node --test tests/layout-recovery.test.js
      - name: Run full tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Commit verified Layout recovery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/stixio-workshop-app-v2.js
          git diff --cached --quiet && exit 0
          git commit -m "Complete Layout source and Frame recovery"
          git push origin HEAD:layout-full-recovery
