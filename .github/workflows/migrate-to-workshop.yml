name: Migrate product to Workshop

on:
  push:
    branches:
      - stixio-workshop
    paths:
      - 'scripts/migrate-to-workshop.mjs'
      - '.github/workflows/migrate-to-workshop.yml'

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stixio-workshop
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Workshop migration
        run: node scripts/migrate-to-workshop.mjs
      - name: Verify Workshop entry exists
        run: |
          test -f workshop.html
          test -f src/ui/stixio-workshop-app.js
          test -f docs/WORKSHOP-ARCHITECTURE.md
          test -f tests/workshop-integration.test.js
          test -f src/core/sticker-presets.js
      - name: Commit migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Reposition Stixio as Workshop"
          git push origin HEAD:stixio-workshop
