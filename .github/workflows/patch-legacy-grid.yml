name: Patch legacy grid controls

on:
  push:
    paths:
      - '.github/workflows/patch-legacy-grid.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply safe grid patch
        run: node scripts/patch-legacy-grid.mjs
      - name: Verify patched HTML
        run: |
          grep -q "const gridValueLabels" index.html
          grep -q "gridMarginX: 'marginValX'" index.html
          ! grep -q "state.layout === '1x1'" index.html
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix legacy grid margin and gap controls"
          git push
