name: Deploy Stixio Production

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_ref:
        description: 'Exact verified tag or commit to deploy'
        required: true
        default: 'v1.0.0'

permissions:
  contents: read

concurrency:
  group: stixio-production-deployment
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Resolve verified release ref
        id: release
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ inputs.release_ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require Stixio v1.0.0
        run: |
          if [[ "${{ steps.release.outputs.ref }}" != "v1.0.0" ]]; then
            echo 'Production deployment accepts only the verified v1.0.0 tag.'
            exit 1
          fi

      - name: Checkout verified release
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Require real-user sign-off
        run: |
          grep -Fq 'Decision: **APPROVED**' docs/USER-TEST-SIGNOFF.md
          ! grep -Eq '^\| Pending ' docs/USER-TEST-SIGNOFF.md

      - name: Build verified production artifact
        run: |
          npm ci
          npm test
          npm run build
          test -s dist/public/app/stixio-workshop-1.0.0.js
          grep -q 'meta name="stixio-version" content="1.0.0"' dist/index.html

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Deploy production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=stixio --branch=production --commit-hash=${{ github.sha }}
