name: Verify Workshop entry

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-workshop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify Workshop files
        run: |
          test -f workshop.html
          test -f src/ui/stixio-workshop-app.js
          test -f src/core/sticker-presets.js
          test -f docs/WORKSHOP-ARCHITECTURE.md
      - name: Check module syntax
        run: |
          node --check src/ui/stixio-workshop-app.js
          node --check src/core/sticker-presets.js
      - name: Run tests
        run: npm test
      - name: Build
        run: npm run build
