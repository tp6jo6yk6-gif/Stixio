name: Deploy Stixio Beta

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stixio-beta-deployment
  cancel-in-progress: true

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    environment:
      name: beta
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build Beta
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Workflow browser tests
        run: npm run test:e2e:workflow

      - name: Validate Beta build
        run: |
          test -f dist/index.html
          test -f dist/_headers
          test -f dist/public/robots.txt
          test -f dist/src/ui/workshop-flow-app.js
          test -f dist/src/ui/workshop-flow-experience.js
          grep -q 'workflow-20260702-3' dist/index.html
          grep -q 'enhanceWorkshopFlow' dist/index.html
          grep -q 'enhanceWorkflowExperience' dist/index.html
          grep -q 'data-workflow-managed' dist/src/ui/workshop-flow-app.js
          grep -q 'data-mobile-workflow-nav' dist/src/ui/workshop-flow-experience.js

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo 'Missing CLOUDFLARE_API_TOKEN'; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo 'Missing CLOUDFLARE_ACCOUNT_ID'; exit 1; }

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=stixio-beta --branch=main --commit-hash=${{ github.sha }}
