name: Debug large project build

on:
  push:
    branches:
      - release/1.0.0
  workflow_dispatch:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/1.0.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install and capture build
        shell: bash
        run: |
          set +e
          npm install > install-output.txt 2>&1
          echo $? > install-exit-code.txt
          npm run build > build-output.txt 2>&1
          echo $? > build-exit-code.txt
          cp src/ui/stixio-workshop-app-v2.js patched-workshop.js
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: debug-large-project-build
          path: |
            install-output.txt
            install-exit-code.txt
            build-output.txt
            build-exit-code.txt
            patched-workshop.js
          retention-days: 2
