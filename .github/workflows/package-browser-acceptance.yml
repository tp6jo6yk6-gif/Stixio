name: Package browser acceptance

on:
  push:
    branches:
      - package-full-completion
    paths:
      - 'src/core/package-workflow.js'
      - 'src/core/package.js'
      - 'src/core/export/**'
      - 'src/core/index.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'src/ui/package-controller.js'
      - 'scripts/apply-package-full-completion.mjs'
      - 'scripts/apply-package-core-compatibility.mjs'
      - 'scripts/apply-package-controller-fixes.mjs'
      - 'tests/package-full-completion.test.js'
      - 'tests/e2e/package.spec.js'
      - 'playwright.package.config.js'
      - 'package.json'
      - '.github/workflows/package-browser-acceptance.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/core/package-workflow.js'
      - 'src/core/package.js'
      - 'src/core/export/**'
      - 'src/core/index.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'src/ui/package-controller.js'
      - 'scripts/apply-package-full-completion.mjs'
      - 'scripts/apply-package-core-compatibility.mjs'
      - 'scripts/apply-package-controller-fixes.mjs'
      - 'tests/package-full-completion.test.js'
      - 'tests/e2e/package.spec.js'
      - 'playwright.package.config.js'
      - 'package.json'
      - '.github/workflows/package-browser-acceptance.yml'
  workflow_dispatch:

concurrency:
  group: package-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  chromium-package:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Package full completion
        run: |
          set -o pipefail
          {
            echo '=== Migration syntax ==='
            node --check scripts/apply-package-full-completion.mjs
            node --check scripts/apply-package-core-compatibility.mjs
            node --check scripts/apply-package-controller-fixes.mjs
            echo '=== Migration apply ==='
            node scripts/apply-package-core-compatibility.mjs
            node scripts/apply-package-controller-fixes.mjs
            if grep -q "PACKAGE_FULL_COMPLETION" src/ui/stixio-workshop-app-v2.js; then
              echo "Package migration already applied."
            else
              node scripts/apply-package-full-completion.mjs
            fi
          } 2>&1 | tee package-migration.log
      - name: Install test dependencies
        run: npm install
      - name: Check syntax, unit tests and build
        run: |
          set -o pipefail
          {
            echo '=== Package UI syntax ==='
            node --check src/ui/stixio-workshop-app-v2.js
            node --check src/ui/package-controller.js
            echo '=== Package core syntax ==='
            node --check src/core/package-workflow.js
            echo '=== Unit tests ==='
            npm test
            echo '=== Build ==='
            npm run build
          } 2>&1 | tee package-ci.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Package browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:package 2>&1 | tee package-browser.log
      - name: Upload Package report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-browser-report
          path: |
            package-migration.log
            package-ci.log
            package-browser.log
            src/core/package-workflow.js
            src/ui/package-controller.js
            src/ui/stixio-workshop-app-v2.js
            playwright-report/package
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Commit verified Package implementation
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/package-workflow.js src/ui/package-controller.js src/ui/stixio-workshop-app-v2.js
          git diff --cached --quiet && exit 0
          git commit -m "Complete Package delivery workflow and Chromium interactions"
          git push origin HEAD:${HEAD_BRANCH}
