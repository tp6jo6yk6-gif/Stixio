name: Package browser acceptance

on:
  push:
    branches:
      - package-full-completion
    paths:
      - 'src/core/package-workflow.js'
      - 'src/core/package.js'
      - 'src/core/export/**'
      - 'src/core/index.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'src/ui/package-controller.js'
      - 'scripts/apply-package-full-completion.mjs'
      - 'scripts/apply-package-core-compatibility.mjs'
      - 'scripts/apply-package-controller-fixes.mjs'
      - 'tests/package-full-completion.test.js'
      - 'tests/e2e/package.spec.js'
      - 'playwright.package.config.js'
      - 'package.json'
      - '.github/workflows/package-browser-acceptance.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/core/package-workflow.js'
      - 'src/core/package.js'
      - 'src/core/export/**'
      - 'src/core/index.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'src/ui/package-controller.js'
      - 'scripts/apply-package-full-completion.mjs'
      - 'scripts/apply-package-core-compatibility.mjs'
      - 'scripts/apply-package-controller-fixes.mjs'
      - 'tests/package-full-completion.test.js'
      - 'tests/e2e/package.spec.js'
      - 'playwright.package.config.js'
      - 'package.json'
      - '.github/workflows/package-browser-acceptance.yml'
  workflow_dispatch:

concurrency:
  group: package-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromium-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify committed Package implementation
        run: |
          node --check scripts/apply-package-full-completion.mjs
          node --check scripts/apply-package-core-compatibility.mjs
          node --check scripts/apply-package-controller-fixes.mjs
          grep -q "PACKAGE_FULL_COMPLETION" src/ui/stixio-workshop-app-v2.js
          node --check src/ui/stixio-workshop-app-v2.js
          node --check src/ui/package-controller.js
          node --check src/core/package-workflow.js
      - name: Install test dependencies
        run: npm ci
      - name: Unit tests and build
        run: |
          set -o pipefail
          {
            npm test
            npm run build
          } 2>&1 | tee package-ci.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Package browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:package 2>&1 | tee package-browser.log
      - name: Upload Package report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package-browser-report
          path: |
            package-ci.log
            package-browser.log
            playwright-report/package
            test-results
          if-no-files-found: ignore
          retention-days: 14
