name: Legacy Parity RC Batch 3

on:
  push:
    branches:
      - workshop-parity-rc1
    paths:
      - '.github/workflows/legacy-parity-rc-run3.yml'
      - 'src/**'
      - 'tests/e2e/parity*.spec.js'
      - 'scripts/fix-parity-hidden-input.mjs'
      - 'scripts/apply-rc1-parity-fixes.mjs'
      - 'scripts/fix-parity-refine-review-spec.mjs'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: legacy-parity-rc-batch3-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromium-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply verified RC test preparation
        run: |
          node --check scripts/fix-parity-hidden-input.mjs
          node scripts/fix-parity-hidden-input.mjs
      - name: Install dependencies
        run: npm ci
      - name: Test and build
        run: |
          npm test
          npm run build
          npm run parity:extract
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run all Legacy parity tests
        run: npm run test:e2e:parity
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-parity-rc-batch3
          path: |
            parity-results
            playwright-report/parity
            test-results
          if-no-files-found: error
          retention-days: 30
