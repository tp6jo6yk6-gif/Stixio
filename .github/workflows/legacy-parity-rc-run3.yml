name: Finalize Legacy Parity RC1

on:
  pull_request:
    branches:
      - workshop-parity-rc1
  workflow_dispatch:

concurrency:
  group: finalize-legacy-parity-rc1
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finalize-rc1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: workshop-parity-rc1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply verified RC1 sources
        run: |
          node --check scripts/finalize-rc1.mjs
          node scripts/finalize-rc1.mjs
      - name: Install dependencies
        run: npm ci
      - name: Verify finalized unit tests and build
        run: |
          npm test
          npm run build
          npm run parity:extract
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify finalized Magic and reorder parity
        run: npx playwright test --config=playwright.parity.config.js -g "Magic Delete|drag reorder changes geometry order"
      - name: Commit finalized RC1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Finalize Stixio 1.0.0 RC1 parity gate"
          git push origin HEAD:workshop-parity-rc1
