name: Finalize Legacy Parity RC1

on:
  pull_request:
    branches:
      - workshop-parity-rc1
  workflow_dispatch:

concurrency:
  group: finalize-legacy-parity-rc1
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  finalize-rc1:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: workshop-parity-rc1
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Apply verified RC1 sources
        run: |
          node --check scripts/finalize-rc1.mjs
          node scripts/finalize-rc1.mjs
          node --input-type=module -e "import{readFile,writeFile}from'node:fs/promises';const p=JSON.parse(await readFile('package-lock.json','utf8'));p.version='1.0.0-rc.1';if(p.packages?.[''])p.packages[''].version='1.0.0-rc.1';await writeFile('package-lock.json',JSON.stringify(p,null,2)+'\n');"
      - name: Install dependencies
        run: npm ci
      - name: Verify finalized unit tests and build
        run: |
          npm test
          npm run build
          npm run parity:extract
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Verify finalized Magic and reorder parity
        run: npx playwright test --config=playwright.parity.config.js -g "Magic Delete|drag reorder changes geometry order"
      - name: Upload finalized RC1 source tree
        uses: actions/upload-artifact@v4
        with:
          name: stixio-rc1-finalized-source
          path: |
            .gitignore
            .github/workflows/legacy-parity-rc.yml
            package.json
            package-lock.json
            playwright.parity.config.js
            docs/LEGACY-PARITY-RC1.md
            docs/RC1-PROGRESS.md
            src/core/destination-profiles.js
            src/ui/destination-controller.js
            src/ui/stixio-workshop-app-v2.js
            tests/e2e/parity.spec.js
            tests/e2e/parity-layout-refine-package.spec.js
            tests/e2e/parity-multisource-mask-review.spec.js
            tests/e2e/parity-refine-review.spec.js
            tests/e2e/parity-stress.spec.js
            tests/rc1-package-identity.test.js
            tests/workshop-naming.test.js
          if-no-files-found: error
          retention-days: 7
