name: Project browser acceptance

on:
  push:
    branches:
      - document-project-full-completion
    paths:
      - 'src/core/project-workflow.js'
      - 'src/core/project-storage.js'
      - 'src/core/index.js'
      - 'src/ui/project-controller.js'
      - 'src/ui/package-controller.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'scripts/apply-document-project-completion.mjs'
      - 'scripts/apply-document-project-fixes.mjs'
      - 'tests/project-workflow.test.js'
      - 'tests/e2e/project.spec.js'
      - 'playwright.project.config.js'
      - 'package.json'
      - '.github/workflows/project-browser-acceptance.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: project-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  chromium-project:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Document and Project completion
        run: |
          set -o pipefail
          {
            node --check scripts/apply-document-project-completion.mjs
            node --check scripts/apply-document-project-fixes.mjs
            node scripts/apply-document-project-fixes.mjs
            if grep -q "DOCUMENT_PROJECT_FULL_COMPLETION" src/ui/stixio-workshop-app-v2.js; then
              echo "Project migration already applied."
            else
              node scripts/apply-document-project-completion.mjs
            fi
          } 2>&1 | tee project-migration.log
      - name: Install dependencies
        run: npm install
      - name: Check syntax, unit tests and build
        run: |
          set -o pipefail
          {
            node --check src/core/project-workflow.js
            node --check src/core/project-storage.js
            node --check src/ui/project-controller.js
            node --check src/ui/package-controller.js
            node --check src/ui/stixio-workshop-app-v2.js
            npm test
            npm run build
          } 2>&1 | tee project-ci.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Project browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:project 2>&1 | tee project-browser.log
      - name: Upload Project report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-browser-report
          path: |
            project-migration.log
            project-ci.log
            project-browser.log
            src/ui/project-controller.js
            src/ui/stixio-workshop-app-v2.js
            src/ui/package-controller.js
            tests/e2e/project.spec.js
            tests/project-workflow.test.js
            playwright-report/project
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Commit verified Project integration
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/project-controller.js src/ui/stixio-workshop-app-v2.js src/ui/package-controller.js tests/e2e/project.spec.js tests/project-workflow.test.js package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "Complete Document and Project workflow"
          git push origin HEAD:${HEAD_BRANCH}
