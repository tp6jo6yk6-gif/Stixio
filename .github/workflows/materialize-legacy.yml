name: Materialize legacy HTML

on:
  push:
    paths:
      - '.github/workflows/materialize-legacy.yml'

permissions:
  contents: write

jobs:
  materialize:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize editable index.html
        run: node scripts/materialize-legacy.mjs

      - name: Verify restored HTML
        run: |
          test "$(wc -c < index.html)" -eq 121265
          echo "0fe22cb1976eb3546f2615de706838323b29257553343bda3f3df597de1b0d2e  index.html" | sha256sum -c -
          grep -q "Step 1: 匯入與全域設定" index.html
          grep -q "魔術去背" index.html
          grep -q "一鍵打包下載 ZIP" index.html

      - name: Commit direct editable HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Materialize original Stixio as editable index.html"
          git push
