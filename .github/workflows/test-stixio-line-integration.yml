name: Test Stixio LINE integration

on:
  push:
    branches:
      - stixio-line-integration
    paths:
      - 'src/core/**'
      - 'src/ui/stixio-line-app.js'
      - 'stixio-line.html'
      - '.github/workflows/test-stixio-line-integration.yml'

permissions:
  contents: read

jobs:
  syntax-and-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: stixio-line-integration
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check module syntax
        run: |
          node --check src/ui/stixio-line-app.js
          node --check src/core/line-presets.js
          node --check src/core/detection/content-bounds.js
          node --check src/core/detection/projection-grid.js
          node --check src/core/refine/mask-engine.js
          node --check src/core/export/multi-source-export.js
      - name: Run existing project tests
        run: npm test --if-present
      - name: Build static site
        run: npm run build
