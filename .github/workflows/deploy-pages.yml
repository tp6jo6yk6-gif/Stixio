name: Deploy Stixio to GitHub Pages

on:
  push:
    branches:
      - release/1.0.0
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'src/**'
      - 'public/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        run: npm run build

      - name: Verify Pages output
        run: |
          test -f dist/index.html
          test -f dist/public/app/stixio-workshop-1.0.0.js
          test -f dist/public/vendor/jszip-3.10.1.min.js
          test -f dist/public/vendor/tailwind-3.4.17.css

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Re-trigger deployment after switching Pages source to GitHub Actions.
