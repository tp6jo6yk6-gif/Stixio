name: Build Stixio Preview Artifact

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'src/**'
      - 'public/**'
      - 'scripts/build-static.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-artifact
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static preview
        run: npm run build

      - name: Validate preview entry
        run: |
          test -f dist/index.html
          test -f dist/src/ui/stixio-workshop-app-v2.js
          grep -q "initStixioWorkshop" dist/index.html
          grep -q "DESTINATION_RULES_FULL_COMPLETION" dist/src/ui/stixio-workshop-app-v2.js

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: stixio-workshop-preview
          path: dist
          if-no-files-found: error
          retention-days: 14
