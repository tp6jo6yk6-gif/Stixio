name: Deploy Stixio Preview

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'manifest.json'
      - 'src/**'
      - 'public/**'
      - 'scripts/build-static.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

environment:
  name: github-pages
  url: ${{ steps.deployment.outputs.page_url }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static preview
        run: |
          npm run build
          touch dist/.nojekyll

      - name: Validate preview entry
        run: |
          test -f dist/index.html
          test -f dist/src/ui/stixio-workshop-app-v2.js
          grep -q "initStixioWorkshop" dist/index.html
          grep -q "DESTINATION_RULES_FULL_COMPLETION" dist/src/ui/stixio-workshop-app-v2.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
