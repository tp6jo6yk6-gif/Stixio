name: Test Stixio Workshop

on:
  push:
    branches:
      - stixio-workshop
      - workshop-output-batch
      - workshop-ux-batch
      - local-preview-page
    paths:
      - 'src/core/**'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'src/ui/workshop-ux.js'
      - 'src/ui/workshop-ux-bridge.js'
      - 'index.html'
      - 'local-preview.html'
      - 'local-preview.js'
      - 'scripts/build-static.js'
      - 'package.json'
      - 'README.md'
      - 'tests/**'
      - '.github/workflows/test-stixio-workshop.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  syntax-and-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check module syntax
        run: |
          node --check src/ui/stixio-workshop-app-v2.js
          node --check src/ui/workshop-ux.js
          node --check src/ui/workshop-ux-bridge.js
          node --check local-preview.js
          node --check src/core/workshop-output.js
          node --check src/core/sticker-presets.js
          node --check src/core/detection/content-bounds.js
          node --check src/core/detection/projection-grid.js
          node --check src/core/refine/mask-engine.js
          node --check src/core/export/multi-source-export.js
      - name: Check Workshop naming
        run: node --test tests/workshop-naming.test.js
      - name: Check Workshop integration
        run: node --test tests/workshop-integration.test.js tests/workshop-output-batch.test.js tests/workshop-ux.test.js tests/local-preview.test.js
      - name: Run project tests
        run: npm test
      - name: Build static site
        run: npm run build
