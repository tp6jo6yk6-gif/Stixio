name: Test Stixio Workshop

on:
  push:
    branches:
      - stixio-workshop
    paths:
      - 'src/core/**'
      - 'src/ui/stixio-workshop-app.js'
      - 'workshop.html'
      - 'tests/**'
      - '.github/workflows/test-stixio-workshop.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  syntax-and-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check module syntax
        run: |
          node --check src/ui/stixio-workshop-app.js
          node --check src/core/sticker-presets.js
          node --check src/core/detection/content-bounds.js
          node --check src/core/detection/projection-grid.js
          node --check src/core/refine/mask-engine.js
          node --check src/core/export/multi-source-export.js
      - name: Check Workshop naming
        continue-on-error: true
        run: node --test tests/workshop-naming.test.js
      - name: Commit naming diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/workshop-naming-violations.txt
          git diff --cached --quiet && exit 0
          git commit -m "Record Workshop naming diagnostics"
          git push origin HEAD:stixio-workshop
      - name: Check Workshop integration
        run: node --test tests/workshop-integration.test.js
      - name: Run remaining project tests
        run: npm test
      - name: Build static site
        run: npm run build
