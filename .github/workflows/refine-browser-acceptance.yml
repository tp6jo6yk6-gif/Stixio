name: Refine browser acceptance

on:
  push:
    branches:
      - refine-full-completion
    paths:
      - 'src/core/image-processing.js'
      - 'src/core/refine/**'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'scripts/apply-refine-full-completion.mjs'
      - 'scripts/apply-refine-contract-fixes.mjs'
      - 'tests/refine-completion.test.js'
      - 'tests/e2e/refine.spec.js'
      - 'playwright.refine.config.js'
      - 'package.json'
      - '.github/workflows/refine-browser-acceptance.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/core/image-processing.js'
      - 'src/core/refine/**'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'scripts/apply-refine-full-completion.mjs'
      - 'scripts/apply-refine-contract-fixes.mjs'
      - 'tests/refine-completion.test.js'
      - 'tests/e2e/refine.spec.js'
      - 'playwright.refine.config.js'
      - 'package.json'
      - '.github/workflows/refine-browser-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium-refine:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Verify committed Refine implementation
        run: |
          node --check scripts/apply-refine-full-completion.mjs
          node --check scripts/apply-refine-contract-fixes.mjs
          grep -q "REFINE_FULL_COMPLETION" src/ui/stixio-workshop-app-v2.js
          node --check src/ui/stixio-workshop-app-v2.js
          node --check src/core/image-processing.js
          node --check src/core/refine/mask-engine.js
          node --check src/core/refine/refine-view.js
      - name: Install test dependencies
        run: npm ci
      - name: Unit tests and build
        run: |
          set -o pipefail
          {
            npm test
            npm run build
          } 2>&1 | tee refine-ci.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Refine browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:refine 2>&1 | tee refine-browser.log
      - name: Upload Refine browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine-browser-report
          path: |
            refine-ci.log
            refine-browser.log
            playwright-report/refine
            test-results
          if-no-files-found: ignore
          retention-days: 14
