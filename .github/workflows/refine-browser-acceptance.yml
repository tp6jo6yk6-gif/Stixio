name: Refine browser acceptance

on:
  push:
    branches:
      - refine-full-completion
    paths:
      - 'src/core/image-processing.js'
      - 'src/core/refine/**'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'scripts/apply-refine-full-completion.mjs'
      - 'tests/refine-completion.test.js'
      - 'tests/e2e/refine.spec.js'
      - 'playwright.refine.config.js'
      - 'package.json'
      - '.github/workflows/refine-browser-acceptance.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/core/image-processing.js'
      - 'src/core/refine/**'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'scripts/apply-refine-full-completion.mjs'
      - 'tests/refine-completion.test.js'
      - 'tests/e2e/refine.spec.js'
      - 'playwright.refine.config.js'
      - 'package.json'
      - '.github/workflows/refine-browser-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  chromium-refine:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Apply Refine full completion
        run: |
          node --check scripts/apply-refine-full-completion.mjs
          if grep -q "REFINE_FULL_COMPLETION" src/ui/stixio-workshop-app-v2.js; then
            echo "Refine migration already applied."
          else
            node scripts/apply-refine-full-completion.mjs
          fi
      - name: Install test dependencies
        run: npm install
      - name: Check syntax, unit tests and build
        run: |
          node --check src/ui/stixio-workshop-app-v2.js
          node --check src/core/image-processing.js
          node --check src/core/refine/mask-engine.js
          node --check src/core/refine/refine-view.js
          npm test
          npm run build
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Refine browser acceptance
        run: npm run test:e2e:refine
      - name: Upload Refine browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: refine-browser-report
          path: |
            playwright-report/refine
            test-results
          if-no-files-found: ignore
          retention-days: 14
      - name: Commit verified Refine UI
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/stixio-workshop-app-v2.js package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "Complete Refine workflow and browser interactions"
          git push origin HEAD:${HEAD_BRANCH}
