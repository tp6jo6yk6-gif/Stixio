name: Destination Rules browser acceptance

on:
  push:
    branches:
      - destination-rules-full-completion
    paths:
      - 'src/core/destination-profiles.js'
      - 'src/core/project-workflow.js'
      - 'src/core/review/**'
      - 'src/core/index.js'
      - 'src/ui/destination-controller.js'
      - 'src/ui/package-controller.js'
      - 'src/ui/stixio-workshop-app-v2.js'
      - 'tests/destination-profiles.test.js'
      - 'tests/destination-project-state.test.js'
      - 'tests/e2e/destination.spec.js'
      - 'tests/e2e/package.spec.js'
      - 'playwright.destination.config.js'
      - 'playwright.package.config.js'
      - 'package.json'
      - '.github/workflows/destination-browser-acceptance.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: destination-browser-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  chromium-destination:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: Check syntax, unit tests and build
        run: |
          set -o pipefail
          {
            node --check src/core/destination-profiles.js
            node --check src/core/project-workflow.js
            node --check src/core/review/review-engine.js
            node --check src/core/review/review-workflow.js
            node --check src/ui/destination-controller.js
            node --check src/ui/package-controller.js
            node --check src/ui/stixio-workshop-app-v2.js
            npm test
            npm run build
          } 2>&1 | tee destination-ci.log
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Destination Rules browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:destination 2>&1 | tee destination-browser.log
      - name: Run Package compatibility browser acceptance
        run: |
          set -o pipefail
          npm run test:e2e:package 2>&1 | tee package-browser.log
      - name: Upload Destination Rules report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: destination-browser-report
          path: |
            destination-ci.log
            destination-browser.log
            package-browser.log
            playwright-report/destination
            playwright-report/package
            test-results
          if-no-files-found: ignore
          retention-days: 14
